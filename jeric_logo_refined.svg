    <!-- Name only -->
    <text x="340" y="250" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="28" font-weight="200" fill="white" letter-spacing="8" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Outfit, sans-serif;font-size:28px;font-weight:200;text-anchor:middle;dominant-baseline:auto">JERIC</text>

    <!-- Corner brackets -->
    <path d="M205,35 L205,25 L215,25" fill="none" stroke="#1a4fd8" stroke-width="1.2" style="fill:none;stroke:rgb(26, 79, 216);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M475,35 L475,25 L465,25" fill="none" stroke="#1a4fd8" stroke-width="1.2" style="fill:none;stroke:rgb(26, 79, 216);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M205,305 L205,315 L215,315" fill="none" stroke="#1a4fd8" stroke-width="1.2" style="fill:none;stroke:rgb(26, 79, 216);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
