    <line x1="275" y1="130" x2="290" y2="118" stroke="#1a4fd8" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.6" style="fill:rgb(0, 0, 0);stroke:rgb(26, 79, 216);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-dasharray:3px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

